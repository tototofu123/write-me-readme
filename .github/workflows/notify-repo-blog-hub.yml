name: Notify Public Repo Blog Hub

on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch blog hub refresh
        env:
          PAT: ${{ secrets.REPO_BLOG_TRIGGER_TOKEN }}
        run: |
          if [ -z "$PAT" ]; then
            echo "REPO_BLOG_TRIGGER_TOKEN not set; skipping dispatch."
            exit 0
          fi
          curl -sS -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            https://api.github.com/repos/tototofu123/public-repo-blog-hub/dispatches \
            -d '{"event_type":"repo-updated"}'